<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1a0a1f"/>
      <stop offset="100%" stop-color="#0a0005"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Glow under tree -->
  <ellipse cx="200" cy="270" rx="70" ry="18" fill="url(#glow1)"/>

  <!-- Ground -->
  <ellipse cx="200" cy="278" rx="90" ry="12" fill="#3a0a20" opacity="0.6"/>

  <!-- Trunk -->
  <line x1="200" y1="278" x2="200" y2="200" stroke="#8b4513" stroke-width="10" stroke-linecap="round"/>
  <!-- Branch L1 -->
  <line x1="200" y1="215" x2="160" y2="175" stroke="#8b4513" stroke-width="6" stroke-linecap="round"/>
  <line x1="200" y1="205" x2="245" y2="165" stroke="#8b4513" stroke-width="6" stroke-linecap="round"/>
  <!-- Branch L2 -->
  <line x1="160" y1="175" x2="130" y2="148" stroke="#8b4513" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="175" x2="178" y2="145" stroke="#8b4513" stroke-width="4" stroke-linecap="round"/>
  <line x1="245" y1="165" x2="268" y2="140" stroke="#8b4513" stroke-width="4" stroke-linecap="round"/>
  <line x1="245" y1="165" x2="222" y2="140" stroke="#8b4513" stroke-width="4" stroke-linecap="round"/>
  <!-- Top branch -->
  <line x1="200" y1="200" x2="200" y2="168" stroke="#8b4513" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="168" x2="185" y2="148" stroke="#8b4513" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="168" x2="216" y2="148" stroke="#8b4513" stroke-width="3" stroke-linecap="round"/>

  <!-- Leaf clusters (circles with glow) -->
  <circle cx="130" cy="142" r="22" fill="#ff6b9d" opacity="0.85" filter="url(#blur1)"/>
  <circle cx="130" cy="142" r="14" fill="#ff6b9d" opacity="0.9"/>

  <circle cx="178" cy="138" r="20" fill="#ff6b9d" opacity="0.85" filter="url(#blur1)"/>
  <circle cx="178" cy="138" r="12" fill="#ff6b9d" opacity="0.9"/>

  <circle cx="268" cy="133" r="22" fill="#ff6b9d" opacity="0.85" filter="url(#blur1)"/>
  <circle cx="268" cy="133" r="14" fill="#ff6b9d" opacity="0.9"/>

  <circle cx="222" cy="133" r="20" fill="#ff6b9d" opacity="0.85" filter="url(#blur1)"/>
  <circle cx="222" cy="133" r="12" fill="#ff6b9d" opacity="0.9"/>

  <circle cx="185" cy="142" r="18" fill="#ff6b9d" opacity="0.8" filter="url(#blur1)"/>
  <circle cx="216" cy="142" r="18" fill="#ff6b9d" opacity="0.8" filter="url(#blur1)"/>

  <circle cx="200" cy="128" r="24" fill="#ff6b9d" opacity="0.85" filter="url(#blur1)"/>
  <circle cx="200" cy="128" r="15" fill="#ff6b9d" opacity="0.92"/>

  <!-- Floating particles -->
  <circle cx="155" cy="115" r="2.5" fill="#ffb3d1" opacity="0.9"/>
  <circle cx="240" cy="108" r="2" fill="#ffb3d1" opacity="0.8"/>
  <circle cx="170" cy="95"  r="1.8" fill="#ffb3d1" opacity="0.7"/>
  <circle cx="230" cy="122" r="2.2" fill="#ffb3d1" opacity="0.85"/>
  <circle cx="148" cy="168" r="1.5" fill="#ffb3d1" opacity="0.6"/>
  <circle cx="260" cy="158" r="2"   fill="#ffb3d1" opacity="0.7"/>
  <circle cx="180" cy="88"  r="1.6" fill="#ffb3d1" opacity="0.65"/>
  <circle cx="210" cy="85"  r="1.8" fill="#ffb3d1" opacity="0.7"/>

  <!-- Title -->
  <text x="200" y="42" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" opacity="0.95"
    font-style="italic" filter="url(#blur1)">Árbol de Momentos</text>
  <text x="200" y="42" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" opacity="0.95"
    font-style="italic">Árbol de Momentos</text>

  <text x="200" y="62" font-family="system-ui, sans-serif" font-size="10" fill="#ff6b9d" text-anchor="middle"
    opacity="0.7" letter-spacing="3">MAMÁ</text>
</svg>
