<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020b18"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="12"/>

  <!-- Nebula glow -->
  <ellipse cx="100" cy="100" rx="80" ry="60" fill="url(#glow)"/>

  <!-- Stars -->
  <circle cx="30"  cy="25"  r="1.2" fill="#a8edea" opacity="0.9"/>
  <circle cx="170" cy="18"  r="0.8" fill="#ffffff"  opacity="0.7"/>
  <circle cx="55"  cy="170" r="1"   fill="#a8edea" opacity="0.8"/>
  <circle cx="148" cy="160" r="1.2" fill="#ffffff"  opacity="0.6"/>
  <circle cx="185" cy="90"  r="0.9" fill="#a8edea" opacity="0.9"/>
  <circle cx="12"  cy="130" r="1"   fill="#ffffff"  opacity="0.5"/>
  <circle cx="90"  cy="15"  r="0.7" fill="#4facfe" opacity="0.8"/>
  <circle cx="165" cy="145" r="0.8" fill="#a8edea" opacity="0.7"/>
  <circle cx="40"  cy="70"  r="0.6" fill="#ffffff"  opacity="0.6"/>
  <circle cx="180" cy="55"  r="1"   fill="#4facfe" opacity="0.7"/>
  <circle cx="25"  cy="155" r="0.7" fill="#ffffff"  opacity="0.5"/>
  <circle cx="130" cy="185" r="0.9" fill="#a8edea" opacity="0.6"/>

  <!-- Portal 1 — large, center-left -->
  <circle cx="80"  cy="95"  r="22" fill="none" stroke="#4facfe" stroke-width="1.5" opacity="0.8"/>
  <circle cx="80"  cy="95"  r="19" fill="#0a2040" opacity="0.9"/>
  <circle cx="80"  cy="95"  r="22" fill="none" stroke="#4facfe" stroke-width="3"   opacity="0.25"/>

  <!-- Portal 2 — medium, right -->
  <circle cx="138" cy="75"  r="15" fill="none" stroke="#4facfe" stroke-width="1.2" opacity="0.7"/>
  <circle cx="138" cy="75"  r="12" fill="#0a2040" opacity="0.85"/>
  <circle cx="138" cy="75"  r="15" fill="none" stroke="#4facfe" stroke-width="2.5" opacity="0.2"/>

  <!-- Portal 3 — small, bottom-right -->
  <circle cx="148" cy="128" r="10" fill="none" stroke="#4facfe" stroke-width="1"   opacity="0.6"/>
  <circle cx="148" cy="128" r="7.5" fill="#0a2040" opacity="0.8"/>

  <!-- Portal 4 — tiny, top -->
  <circle cx="105" cy="45"  r="7"  fill="none" stroke="#4facfe" stroke-width="0.9" opacity="0.55"/>
  <circle cx="105" cy="45"  r="5"  fill="#0a2040" opacity="0.75"/>

  <!-- Connecting dust lines (constellation effect) -->
  <line x1="80" y1="95" x2="138" y2="75"  stroke="#4facfe" stroke-width="0.4" opacity="0.3" stroke-dasharray="2,4"/>
  <line x1="138" y1="75" x2="148" y2="128" stroke="#4facfe" stroke-width="0.4" opacity="0.25" stroke-dasharray="2,4"/>
  <line x1="80" y1="95" x2="105" y2="45"  stroke="#4facfe" stroke-width="0.4" opacity="0.2"  stroke-dasharray="2,4"/>

  <!-- Title text -->
  <text x="100" y="188" text-anchor="middle" font-size="9.5" fill="#a8edea" opacity="0.75"
        font-family="Georgia, serif" font-style="italic" letter-spacing="0.5">Galaxia de Momentos</text>
</svg>
