<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#000008"/>
    </radialGradient>
    <radialGradient id="globe" cx="48%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="40%" stop-color="#1e4a8a"/>
      <stop offset="100%" stop-color="#0a1a3e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#3366cc" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.7">
    <circle cx="20"  cy="15"  r="0.8"/>
    <circle cx="55"  cy="40"  r="0.6"/>
    <circle cx="90"  cy="10"  r="1"/>
    <circle cx="140" cy="25"  r="0.7"/>
    <circle cx="200" cy="8"   r="0.9"/>
    <circle cx="260" cy="18"  r="0.6"/>
    <circle cx="320" cy="30"  r="0.8"/>
    <circle cx="370" cy="12"  r="1"/>
    <circle cx="30"  cy="80"  r="0.7"/>
    <circle cx="350" cy="70"  r="0.6"/>
    <circle cx="380" cy="200" r="0.8"/>
    <circle cx="15"  cy="220" r="0.7"/>
    <circle cx="40"  cy="270" r="0.6"/>
    <circle cx="360" cy="260" r="0.9"/>
    <circle cx="310" cy="280" r="0.7"/>
  </g>

  <!-- Globe atmosphere glow -->
  <circle cx="200" cy="155" r="105" fill="url(#glow)" filter="url(#blur4)"/>

  <!-- Globe body -->
  <circle cx="200" cy="155" r="90" fill="url(#globe)"/>

  <!-- Continent shapes (simplified) -->
  <g fill="#2d5a1b" opacity="0.85">
    <!-- Americas -->
    <ellipse cx="155" cy="130" rx="22" ry="28" transform="rotate(-10,155,130)"/>
    <ellipse cx="162" cy="175" rx="16" ry="22" transform="rotate(5,162,175)"/>
    <!-- Europe/Africa -->
    <ellipse cx="210" cy="120" rx="14" ry="18" transform="rotate(5,210,120)"/>
    <ellipse cx="215" cy="160" rx="12" ry="24" transform="rotate(-3,215,160)"/>
    <!-- Asia -->
    <ellipse cx="250" cy="118" rx="28" ry="16" transform="rotate(-5,250,118)"/>
    <!-- Australia -->
    <ellipse cx="255" cy="178" rx="14" ry="10" transform="rotate(10,255,178)"/>
  </g>

  <!-- Globe border highlight (Fresnel) -->
  <circle cx="200" cy="155" r="90" fill="none" stroke="#4488ff" stroke-width="6" opacity="0.25" filter="url(#blur2)"/>
  <circle cx="200" cy="155" r="90" fill="none" stroke="#6699ff" stroke-width="2" opacity="0.15"/>

  <!-- Country border lines (simplified) -->
  <g stroke="white" stroke-width="0.5" stroke-opacity="0.3" fill="none">
    <path d="M130,135 Q145,128 155,132 Q165,136 170,145"/>
    <path d="M162,155 Q170,162 168,172 Q165,182 158,188"/>
    <path d="M200,110 Q210,108 220,112 Q228,116 224,125"/>
    <path d="M200,130 Q212,128 218,135 Q222,142 218,150"/>
    <path d="M220,105 Q235,100 248,105 Q258,110 262,120"/>
    <path d="M242,120 Q252,115 265,118 Q272,122 270,130"/>
  </g>

  <!-- Flight path curve -->
  <path d="M162,175 Q185,90 235,145" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>

  <!-- Airplane icon -->
  <g transform="translate(225,125) rotate(35)" fill="#e879f9">
    <path d="M0,-5 L-2,3 L0,2 L2,3 Z" opacity="0.9"/>
    <path d="M-4,0 L4,0 L3,1 L-3,1 Z" opacity="0.9"/>
    <path d="M-1.5,2 L1.5,2 L1,3.5 L-1,3.5 Z" opacity="0.9"/>
  </g>

  <!-- Trail -->
  <path d="M162,175 Q175,145 200,135 Q215,130 225,127" fill="none" stroke="#a855f7" stroke-width="1.2" opacity="0.5"/>

  <!-- Origin dot -->
  <circle cx="162" cy="175" r="3" fill="#e879f9" opacity="0.9"/>
  <circle cx="162" cy="175" r="6" fill="none" stroke="#e879f9" stroke-width="1" opacity="0.4"/>

  <!-- Destination dot -->
  <circle cx="235" cy="145" r="3" fill="#e879f9" opacity="0.6"/>

  <!-- Title -->
  <text x="200" y="268" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="13" font-weight="500" letter-spacing="2">VUELO GLOBAL</text>
</svg>
