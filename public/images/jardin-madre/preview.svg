<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0020"/>
      <stop offset="100%" stop-color="#0a0005"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>
  <circle cx="100" cy="95" r="55" fill="url(#glow)"/>

  <!-- Petals -->
  <ellipse cx="100" cy="58" rx="10" ry="20" fill="#ff6b9d" opacity="0.85"/>
  <ellipse cx="100" cy="58" rx="10" ry="20" fill="#ff6b9d" opacity="0.85" transform="rotate(60 100 95)"/>
  <ellipse cx="100" cy="58" rx="10" ry="20" fill="#ff6b9d" opacity="0.85" transform="rotate(120 100 95)"/>
  <ellipse cx="100" cy="58" rx="10" ry="20" fill="#ff6b9d" opacity="0.85" transform="rotate(180 100 95)"/>
  <ellipse cx="100" cy="58" rx="10" ry="20" fill="#ff6b9d" opacity="0.85" transform="rotate(240 100 95)"/>
  <ellipse cx="100" cy="58" rx="10" ry="20" fill="#ff6b9d" opacity="0.85" transform="rotate(300 100 95)"/>

  <!-- Center circle -->
  <circle cx="100" cy="95" r="18" fill="#1a0020" stroke="#ff6b9d" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="100" cy="95" r="13" fill="#2d0030" opacity="0.9"/>

  <!-- Stem -->
  <rect x="97.5" y="113" width="5" height="30" rx="2.5" fill="#22c55e" opacity="0.7"/>

  <!-- Small falling petals -->
  <ellipse cx="55"  cy="60"  rx="4" ry="7" fill="#ff6b9d" opacity="0.5" transform="rotate(30 55 60)"/>
  <ellipse cx="148" cy="75"  rx="3" ry="6" fill="#ff6b9d" opacity="0.4" transform="rotate(-20 148 75)"/>
  <ellipse cx="70"  cy="130" rx="3" ry="6" fill="#ff6b9d" opacity="0.45" transform="rotate(45 70 130)"/>
  <ellipse cx="140" cy="45"  rx="4" ry="7" fill="#ff6b9d" opacity="0.35" transform="rotate(-35 140 45)"/>
  <ellipse cx="40"  cy="110" rx="3" ry="5" fill="#ff6b9d" opacity="0.3" transform="rotate(15 40 110)"/>

  <!-- Subtle star particles -->
  <circle cx="30"  cy="40"  r="1.2" fill="white" opacity="0.5"/>
  <circle cx="170" cy="35"  r="1"   fill="white" opacity="0.4"/>
  <circle cx="160" cy="145" r="1.3" fill="white" opacity="0.45"/>
  <circle cx="25"  cy="155" r="1"   fill="white" opacity="0.35"/>
  <circle cx="88"  cy="25"  r="0.9" fill="white" opacity="0.5"/>
  <circle cx="120" cy="170" r="1.1" fill="white" opacity="0.4"/>
</svg>
